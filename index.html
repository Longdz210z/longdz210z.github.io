<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NguyenThanhLong</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url("anime.gif") center/cover no-repeat fixed;
    overflow:hidden;
}

/* overlay */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
}

/* ===== CARD ===== */
.profile-card{
    position:relative;
    z-index:2;
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:30px;
    width:300px;
    text-align:center;
    color:white;
    box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

/* RGB viền */
.profile-card::before{
    content:"";
    position:absolute;
    inset:-2px;
    background:linear-gradient(270deg,#ff00cc,#3333ff,#00ffff,#00ff99,#ffff00,#ff6600);
    background-size:400%;
    animation:rgb 10s linear infinite;
    filter:blur(12px);
    opacity:.4;
    z-index:-1;
}

@keyframes rgb{
    0%{background-position:0%}
    100%{background-position:400%}
}

/* avatar */
.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    border:3px solid white;
    margin-bottom:10px;
}

/* tên */
h1{
    font-size:22px;
    text-shadow:0 0 10px #00c3ff;
    animation:pulse 3s infinite;
}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
}

/* links */
.links-container{
    margin-top:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.link-box{
    padding:12px;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    color:white;
    text-decoration:none;
    transition:.3s;
}

.link-box:hover{
    background:white;
    color:black;
    transform:scale(1.05);
}

/* ===== PLAYER ===== */
.music-player{
    position:fixed;
    top:30px;
    right:30px;
    width:260px;
    padding:15px;
    border-radius:20px;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.music-top{
    display:flex;
    gap:10px;
    align-items:center;
}

.music-cover{
    width:70px;
    height:70px;
    border-radius:10px;
    object-fit:cover;
}

/* progress */
.progress{
    height:4px;
    margin-top:10px;
    background:rgba(255,255,255,0.2);
    border-radius:5px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00c3ff,#ff00cc);
}

/* nút */
.controls{
    margin-top:10px;
    text-align:center;
}

.music-btn{
    padding:8px 15px;
    border:none;
    border-radius:10px;
    background:#00c3ff;
    color:white;
    cursor:pointer;
}

/* 🌊 WAVE REAL */
canvas{
    width:100%;
    height:50px;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- CARD -->
<div class="profile-card" id="card">
    <img src="my-photo.png" class="avatar">
    <h1>NguyenThanhLong</h1>

    <div class="links-container">
        <a href="https://www.facebook.com/" target="_blank" class="link-box">
            <i class="fab fa-facebook"></i> Facebook
        </a>
        <a href="#" class="link-box">
            <i class="fab fa-tiktok"></i> TikTok
        </a>
        <a href="#" class="link-box">
            <i class="fab fa-instagram"></i> Instagram
        </a>
        <a href="#" class="link-box">
            Threads
        </a>
    </div>
</div>

<!-- PLAYER -->
<div class="music-player">
    <div class="music-top">
        <!-- 🔥 ẢNH ANH 7 -->
        <img src="anh7.png" class="music-cover">
        <div>25-07</div>
    </div>

    <canvas id="wave"></canvas>

    <div class="progress">
        <div class="progress-bar" id="bar"></div>
    </div>

    <div class="controls">
        <button class="music-btn" onclick="toggleMusic()">▶</button>
    </div>
</div>

<audio id="music">
    <source src="thaihoang.mp3" type="audio/mpeg">
</audio>

<script>
const card = document.getElementById('card');
const music = document.getElementById('music');
const btn = document.querySelector('.music-btn');
const bar = document.getElementById('bar');

/* card 3D */
document.addEventListener('mousemove', (e)=>{
    const rect = card.getBoundingClientRect();
    const x = (e.clientX - rect.left - rect.width/2)/25;
    const y = (e.clientY - rect.top - rect.height/2)/25;
    card.style.transform=`rotateY(${x}deg) rotateX(${-y}deg)`;
});

/* play */
function toggleMusic(){
    if(music.paused){
        music.volume=0.4;
        music.play().catch(()=>alert("Chưa có file music.mp3"));
        btn.innerText="⏸";
    }else{
        music.pause();
        btn.innerText="▶";
    }
}

/* progress thật */
music.ontimeupdate = ()=>{
    const percent = (music.currentTime / music.duration)*100;
    bar.style.width = percent + "%";
};

/* ===== WAVE REAL (MAX) ===== */
const canvas = document.getElementById("wave");
const ctx = canvas.getContext("2d");

let audioCtx, analyser, source;

function initAudio(){
    audioCtx = new AudioContext();
    analyser = audioCtx.createAnalyser();
    source = audioCtx.createMediaElementSource(music);

    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    analyser.fftSize = 128;
}

function draw(){
    requestAnimationFrame(draw);

    if(!analyser) return;

    const bufferLength = analyser.frequencyBinCount;
    const data = new Uint8Array(bufferLength);
    analyser.getByteFrequencyData(data);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const barWidth = canvas.width / bufferLength;

    for(let i=0;i<bufferLength;i++){
        const height = data[i]/2;
        ctx.fillStyle = `hsl(${i*10},100%,60%)`;
        ctx.fillRect(i*barWidth, canvas.height-height, barWidth-1, height);
    }
}

music.addEventListener("play", ()=>{
    if(!audioCtx){
        initAudio();
        draw();
    }
});
</script>

</body>
</html>
