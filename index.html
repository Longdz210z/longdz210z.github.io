<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NguyenThanhLong</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url("anime.gif") center/cover no-repeat fixed;
}

/* overlay */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
}

/* CARD */
.profile-card{
    z-index:2;
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:30px;
    width:300px;
    text-align:center;
    color:white;
    box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

/* avatar */
.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    border:3px solid white;
    margin-bottom:10px;
}

/* links */
.links-container{
    margin-top:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.link-box{
    padding:12px;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    color:white;
    text-decoration:none;
    transition:0.3s;
}

.link-box:hover{
    background:white;
    color:black;
    transform:scale(1.05);
}

/* PLAYER */
.music-player{
    position:fixed;
    top:30px;
    right:30px;
    width:260px;
    padding:15px;
    border-radius:20px;
    background:rgba(0,0,0,0.7);
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* top */
.music-top{
    display:flex;
    gap:10px;
    align-items:center;
}

.music-cover{
    width:70px;
    height:70px;
    border-radius:10px;
    object-fit:cover;
}

/* time */
.time{
    font-size:12px;
    opacity:0.7;
}

/* progress */
.progress{
    height:4px;
    margin-top:10px;
    background:rgba(255,255,255,0.2);
}

.progress-bar{
    height:100%;
    width:0%;
    background:#00c3ff;
}

/* controls */
.controls{
    margin-top:10px;
    display:flex;
    justify-content:center;
    gap:10px;
}

.music-btn{
    padding:6px 12px;
    border:none;
    border-radius:10px;
    background:#00c3ff;
    color:white;
    cursor:pointer;
}

/* volume */
.volume{
    width:100%;
    margin-top:8px;
}

/* wave */
canvas{
    width:100%;
    height:50px;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- CARD -->
<div class="profile-card">
    <img src="my-photo.png" class="avatar">
    <h2>NguyenThanhLong</h2>

    <div class="links-container">
        <a href="https://www.facebook.com/yourprofile" target="_blank" class="link-box">
            <i class="fab fa-facebook"></i> Facebook
        </a>

        <a href="https://www.tiktok.com/@yourid" target="_blank" class="link-box">
            <i class="fab fa-tiktok"></i> TikTok
        </a>

        <a href="https://www.instagram.com/yourid" target="_blank" class="link-box">
            <i class="fab fa-instagram"></i> Instagram
        </a>

        <a href="https://www.threads.net/@yourid" target="_blank" class="link-box">
            <i class="fa-brands fa-threads"></i> Threads
        </a>
    </div>
</div>

<!-- PLAYER -->
<div class="music-player">
    <div class="music-top">
        <img src="anh7.png" class="music-cover">
        <div>
            <div id="title">Nhạc 1</div>
            <div class="time" id="time">00:00 / 00:00</div>
        </div>
    </div>

    <canvas id="wave"></canvas>

    <div class="progress">
        <div class="progress-bar" id="bar"></div>
    </div>

    <input type="range" min="0" max="1" step="0.01" value="0.5" class="volume" id="volume">

    <div class="controls">
        <button class="music-btn" onclick="prev()">⏮</button>
        <button class="music-btn" onclick="toggleMusic()">▶</button>
        <button class="music-btn" onclick="next()">⏭</button>
    </div>
</div>

<audio id="music"></audio>

<script>
const music = document.getElementById('music');
const btn = document.querySelectorAll('.music-btn')[1];
const bar = document.getElementById('bar');
const title = document.getElementById('title');
const time = document.getElementById('time');
const volume = document.getElementById('volume');

/* 5 bài nhạc */
const songs = [
    {src:"thaihoang.mp3", name:"Bài 1"},
    {src:"friend.mp3", name:"Bài 2"},
    {src:"banthanem.mp3", name:"Bài 3"},
    {src:"khongbuong.mp3", name:"Bài 4"},
    {src:"ohho.mp3", name:"Bài 5"}
];

let index = 0;

function loadSong(i){
    music.src = songs[i].src;
    title.innerText = songs[i].name;
}
loadSong(index);

/* play */
function toggleMusic(){
    if(music.paused){
        music.play();
        btn.innerText="⏸";
    }else{
        music.pause();
        btn.innerText="▶";
    }
}

/* next */
function next(){
    index = (index+1)%songs.length;
    loadSong(index);
    music.play();
}

/* prev */
function prev(){
    index = (index-1+songs.length)%songs.length;
    loadSong(index);
    music.play();
}

/* volume */
volume.oninput = ()=> music.volume = volume.value;

/* time */
music.ontimeupdate = ()=>{
    if(music.duration){
        let c = format(music.currentTime);
        let t = format(music.duration);
        time.innerText = c + " / " + t;
        bar.style.width = (music.currentTime / music.duration)*100 + "%";
    }
};

function format(t){
    let m = Math.floor(t/60);
    let s = Math.floor(t%60);
    return `${m}:${s<10?'0'+s:s}`;
}

/* WAVE */
const canvas = document.getElementById("wave");
const ctx = canvas.getContext("2d");

let audioCtx, analyser, source;

function initAudio(){
    audioCtx = new AudioContext();
    analyser = audioCtx.createAnalyser();
    source = audioCtx.createMediaElementSource(music);

    source.connect(analyser);
    analyser.connect(audioCtx.destination);
}

function draw(){
    requestAnimationFrame(draw);
    if(!analyser) return;

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let i=0;i<data.length;i++){
        let h = data[i]/2;
        ctx.fillStyle = "#00c3ff";
        ctx.fillRect(i*4,50-h,3,h);
    }
}

music.addEventListener("play",()=>{
    if(!audioCtx){
        initAudio();
        draw();
    }
});
</script>

</body>
</html>
