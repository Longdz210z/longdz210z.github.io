<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NguyenThanhLong</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: url("anime.gif") no-repeat center center fixed;
    background-size: cover;
    overflow: hidden;
    perspective: 1000px;
}

/* 🌈 PROFILE RGB (đã FIX mờ) */
.profile-card {
    position: relative;
    overflow: hidden;

    background: rgba(0, 0, 0, 0.55); /* 👈 đậm hơn để dễ nhìn */
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    padding: 40px;
    border-radius: 30px;
    text-align: center;
    width: 350px;
    color: white;
    transform-style: preserve-3d;
    transition: transform 0.1s ease-out;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

/* ✨ RGB nền (đã làm mờ + dịu) */
.profile-card::before {
    content: "";
    position: absolute;
    inset: -2px;

    background: linear-gradient(
        270deg,
        rgba(255,0,204,0.4),
        rgba(51,51,255,0.4),
        rgba(0,255,255,0.4),
        rgba(0,255,153,0.4),
        rgba(255,255,0,0.4),
        rgba(255,102,0,0.4),
        rgba(255,0,204,0.4)
    );

    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;

    z-index: -1;
    filter: blur(15px); /* 👈 giảm */
    opacity: 0.5;       /* 👈 giảm nổi */
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid #fff;
    margin-bottom: 15px;
    object-fit: cover;
}

/* 🔥 TEXT */
h1 {
    margin-bottom: 5px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #fff;
    position: relative;
    display: inline-block;
    will-change: transform;
    filter: brightness(1.1);

    text-shadow: 
        0 0 10px rgba(0, 195, 255, 0.8),
        0 0 20px rgba(0, 195, 255, 0.5);

    animation: pulse 2.5s ease-in-out infinite;
}

/* ✨ ánh sáng */
h1::after {
    content: "";
    position: absolute;
    top: 0;
    left: -200%;
    width: 200%;
    height: 100%;

    background: linear-gradient(
        120deg,
        transparent 0%,
        rgba(255,255,255,0.5),
        transparent 100%
    );

    animation: shine 4s ease-in-out infinite;
}

/* 🔥 pulse */
@keyframes pulse {
    0% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.05); /* 👈 nhẹ hơn */
    }
    100% {
        transform: scale(1);
    }
}

/* ánh sáng */
@keyframes shine {
    0% { transform: translateX(0); opacity: 0; }
    50% { transform: translateX(150%); opacity: 1; }
    100% { transform: translateX(300%); opacity: 0; }
}

h1:hover {
    text-shadow: 
        0 0 20px #00c3ff,
        0 0 40px #00c3ff;
}

p {
    opacity: 0.7;
    margin-bottom: 25px;
    font-style: italic;
}

.links-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.link-box {
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.08);
    text-decoration: none;
    color: white;
    padding: 12px;
    border-radius: 12px;
    font-weight: 600;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.1);
}

.link-box i {
    margin-right: 10px;
    font-size: 18px;
}

.link-box:hover {
    background: white;
    color: black;
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="profile-card" id="card">
    <img src="my-photo.png" alt="Avatar" class="avatar">
    <h1>NguyenThanhLong</h1>
    <p>🌏</p>

    <div class="links-container">
        <a href="https://www.facebook.com/thanh.long.422543" target="_blank" class="link-box">
            <i class="fab fa-facebook"></i> Facebook
        </a>
        <a href="https://www.tiktok.com/@aabcdxyzz25" target="_blank" class="link-box">
            <i class="fab fa-tiktok"></i> TikTok
        </a>
        <a href="https://www.instagram.com/ngnl.ong/" target="_blank" class="link-box">
            <i class="fab fa-instagram"></i> Instagram
        </a>
        <a href="https://www.threads.net/@ngnl.ong" target="_blank" class="link-box">
            <i class="fa-brands fa-threads"></i> Threads
        </a>
    </div>
</div>

<script>
const card = document.getElementById('card');

document.addEventListener('mousemove', (e) => {
    const { width, height, left, top } = card.getBoundingClientRect();
    const x = (e.clientX - left - width / 2) / 20;
    const y = (e.clientY - top - height / 2) / 20;
    card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
});

document.addEventListener('mouseleave', () => {
    card.style.transform = 'rotateY(0deg) rotateX(0deg)';
});
</script>

</body>
</html>
