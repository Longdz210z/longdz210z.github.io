<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url("anime.gif") center/cover no-repeat fixed;
}

/* overlay */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
}

/* CARD */
.profile-card{
    z-index:2;
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:30px;
    width:300px;
    text-align:center;
    color:white;
    box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

/* avatar */
.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    border:3px solid white;
    margin-bottom:10px;
}

/* links */
.links-container{
    margin-top:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.link-box{
    padding:12px;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    color:white;
    text-decoration:none;
    transition:0.3s;
}

.link-box:hover{
    background:white;
    color:black;
    transform:scale(1.05);
}

/* ===== PLAYER FIX MOBILE ===== */
.music-player{
    position:fixed;
    top:15px;
    right:10px;
    width:90%;           /* 🔥 full mobile */
    max-width:320px;     /* desktop */
    padding:18px;
    border-radius:25px;
    background:rgba(0,0,0,0.75);
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* top */
.music-top{
    display:flex;
    gap:12px;
    align-items:center;
}

.music-cover{
    width:60px;
    height:60px;
    border-radius:12px;
    object-fit:cover;
}

/* time */
.time{
    font-size:13px;
    opacity:0.8;
}

/* progress */
.progress{
    height:6px; /* 🔥 to hơn */
    margin-top:12px;
    background:rgba(255,255,255,0.2);
    border-radius:10px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00c3ff,#0077ff);
}

/* controls */
.controls{
    margin-top:12px;
    display:flex;
    justify-content:center;
    gap:12px;
}

/* 🔥 NÚT TO DỄ BẤM */
.music-btn{
    padding:12px 18px;
    font-size:18px;
    border:none;
    border-radius:50px;
    background:linear-gradient(135deg,#00c3ff,#0077ff);
    color:white;
    cursor:pointer;
    box-shadow:0 4px 15px rgba(0,195,255,0.4);
}

/* volume */
.volume{
    width:100%;
    margin-top:10px;
    height:6px;
}

/* wave */
canvas{
    width:100%;
    height:50px;
    margin-top:10px;
}
</style>
